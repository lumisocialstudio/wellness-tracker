<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>The Wellness Club · Daily Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

<style>
/* ─── TOKENS ─────────────────────────────────────────── */
:root {
  --parchment:   #F7F3EE;
  --cream:       #F0EBE3;
  --espresso:    #3D2C20;
  --mocha:       #6B4F3A;
  --sand:        #C4A882;
  --sand-light:  #E8DDD0;
  --sage:        #9CAF95;
  --blush:       #D4A5A5;
  --ink:         #2C1F14;
  --mid:         #8A7060;
  --radius:      16px;
  --shadow:      0 4px 24px rgba(61,44,32,0.08);
  --transition:  0.3s cubic-bezier(0.4,0,0.2,1);
}

/* ─── RESET ──────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--parchment);
  color: var(--espresso);
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 24px 16px 48px;
}

/* ─── CARD ───────────────────────────────────────────── */
.card {
  width: 100%;
  max-width: 440px;
  background: #fff;
  border-radius: 24px;
  box-shadow: var(--shadow);
  overflow: hidden;
}

/* ─── HEADER ─────────────────────────────────────────── */
.header {
  background: var(--espresso);
  padding: 28px 28px 24px;
  position: relative;
}
.header-eyebrow {
  font-family: 'Inter', sans-serif;
  font-size: 0.6rem;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--sand);
  margin-bottom: 6px;
}
.header-title {
  font-family: 'DM Serif Display', serif;
  font-size: 1.55rem;
  color: var(--parchment);
  line-height: 1.2;
}
.header-title em {
  font-style: italic;
  color: var(--sand);
}
.header-date {
  font-size: 0.72rem;
  color: rgba(247,243,238,0.45);
  margin-top: 6px;
  letter-spacing: 0.06em;
}

/* ─── PROGRESS RING ──────────────────────────────────── */
.ring-wrap {
  position: absolute;
  top: 20px;
  right: 24px;
  width: 72px;
  height: 72px;
}
.ring-svg {
  width: 72px;
  height: 72px;
  transform: rotate(-90deg);
}
.ring-track {
  fill: none;
  stroke: rgba(196,168,130,0.2);
  stroke-width: 5;
}
.ring-fill {
  fill: none;
  stroke: var(--sand);
  stroke-width: 5;
  stroke-linecap: round;
  stroke-dasharray: 188.5;
  stroke-dashoffset: 188.5;
  transition: stroke-dashoffset 0.6s cubic-bezier(0.4,0,0.2,1);
}
.ring-label {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--parchment);
}
.ring-pct {
  font-family: 'DM Serif Display', serif;
  font-size: 1.05rem;
  line-height: 1;
}
.ring-done {
  font-size: 0.55rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--sand);
  margin-top: 2px;
}

/* ─── BODY ───────────────────────────────────────────── */
.body {
  padding: 24px 24px 28px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ─── SECTION LABEL ──────────────────────────────────── */
.section-label {
  font-size: 0.6rem;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--mid);
  padding: 6px 0 2px;
}

/* ─── HABIT ROW ──────────────────────────────────────── */
.habit-row {
  background: var(--parchment);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: box-shadow var(--transition);
}
.habit-row.completed {
  background: #F5F8F4;
}
.habit-row-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.habit-name {
  font-size: 0.88rem;
  font-weight: 500;
  color: var(--espresso);
  flex: 1;
}
.habit-sub {
  font-size: 0.72rem;
  color: var(--mid);
  margin-top: 1px;
}

/* ─── CHECKBOX ───────────────────────────────────────── */
.check-btn {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  border: 1.5px solid var(--sand-light);
  background: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all var(--transition);
  -webkit-tap-highlight-color: transparent;
}
.check-btn:hover { border-color: var(--sand); }
.check-btn.checked {
  background: var(--sage);
  border-color: var(--sage);
}
.check-btn svg { display: none; }
.check-btn.checked svg { display: block; }

/* ─── WATER COUNTER ──────────────────────────────────── */
.water-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.water-btn {
  background: var(--cream);
  border: none;
  border-radius: 20px;
  padding: 6px 12px;
  font-family: 'Inter', sans-serif;
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--mocha);
  cursor: pointer;
  transition: background var(--transition);
  -webkit-tap-highlight-color: transparent;
}
.water-btn:hover { background: var(--sand-light); }
.water-display {
  font-family: 'DM Serif Display', serif;
  font-size: 1.1rem;
  color: var(--espresso);
  flex: 1;
  text-align: right;
}
.water-display span {
  font-family: 'Inter', sans-serif;
  font-size: 0.68rem;
  color: var(--mid);
}
.water-bar-wrap {
  height: 4px;
  background: var(--sand-light);
  border-radius: 4px;
  overflow: hidden;
}
.water-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--sand), #b8986a);
  border-radius: 4px;
  transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  width: 0%;
}

/* ─── NUMBER INPUT ───────────────────────────────────── */
.num-input-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
}
.num-stepper {
  display: flex;
  align-items: center;
  background: var(--cream);
  border-radius: 12px;
  overflow: hidden;
  flex: 1;
}
.stepper-btn {
  background: none;
  border: none;
  width: 36px;
  height: 36px;
  font-size: 1.1rem;
  color: var(--mocha);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background var(--transition);
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.stepper-btn:hover { background: var(--sand-light); }
.stepper-val {
  flex: 1;
  text-align: center;
  font-family: 'DM Serif Display', serif;
  font-size: 1.1rem;
  color: var(--espresso);
  border: none;
  background: transparent;
  outline: none;
  width: 60px;
}
.stepper-unit {
  font-size: 0.68rem;
  color: var(--mid);
  padding-right: 12px;
}
.num-goal-badge {
  font-size: 0.65rem;
  color: var(--mid);
  letter-spacing: 0.04em;
  white-space: nowrap;
}

/* ─── TOGGLE ─────────────────────────────────────────── */
.toggle-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
}
.toggle {
  position: relative;
  width: 44px;
  height: 24px;
  flex-shrink: 0;
}
.toggle input { display: none; }
.toggle-track {
  position: absolute;
  inset: 0;
  background: var(--sand-light);
  border-radius: 24px;
  cursor: pointer;
  transition: background var(--transition);
}
.toggle input:checked + .toggle-track { background: var(--sage); }
.toggle-thumb {
  position: absolute;
  top: 3px;
  left: 3px;
  width: 18px;
  height: 18px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 1px 4px rgba(61,44,32,0.2);
  transition: transform var(--transition);
  pointer-events: none;
}
.toggle input:checked ~ .toggle-thumb { transform: translateX(20px); }
.toggle-label {
  font-size: 0.8rem;
  color: var(--mocha);
}

/* ─── CUSTOM HABITS ──────────────────────────────────── */
.custom-row {
  background: var(--parchment);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.custom-row .habit-name {
  flex: 1;
  font-size: 0.85rem;
}

.add-input-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--parchment);
  border-radius: var(--radius);
  padding: 12px 16px;
  border: 1.5px dashed var(--sand-light);
  transition: border-color var(--transition);
}
.add-input-wrap:focus-within { border-color: var(--sand); }
.add-icon {
  font-size: 1rem;
  color: var(--sand);
  flex-shrink: 0;
  line-height: 1;
}
.add-input {
  flex: 1;
  border: none;
  background: transparent;
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
  color: var(--espresso);
  outline: none;
}
.add-input::placeholder { color: var(--mid); }

/* ─── STREAK ─────────────────────────────────────────── */
.streak-section {
  padding: 0 24px 24px;
}
.streak-label {
  font-size: 0.6rem;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--mid);
  margin-bottom: 10px;
}
.streak-days {
  display: flex;
  gap: 6px;
  justify-content: space-between;
}
.streak-day {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}
.streak-dot {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--parchment);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.65rem;
  color: var(--mid);
  font-weight: 500;
  transition: all var(--transition);
}
.streak-day.active .streak-dot {
  background: var(--espresso);
  color: var(--parchment);
}
.streak-day.complete .streak-dot {
  background: var(--sage);
  color: #fff;
}
.streak-day.today .streak-dot {
  border: 2px solid var(--sand);
}
.streak-char {
  font-size: 0.58rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--mid);
}

/* ─── FOOTER ─────────────────────────────────────────── */
.footer {
  padding: 14px 24px 20px;
  border-top: 1px solid var(--parchment);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.footer-text {
  font-size: 0.68rem;
  color: var(--mid);
  letter-spacing: 0.04em;
}
.reset-btn {
  font-family: 'Inter', sans-serif;
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--mid);
  background: none;
  border: none;
  cursor: pointer;
  padding: 6px 0;
  transition: color var(--transition);
}
.reset-btn:hover { color: var(--espresso); }

/* ─── CONFETTI BURST ─────────────────────────────────── */
@keyframes burst {
  0%   { transform: scale(0) rotate(0deg); opacity: 1; }
  80%  { transform: scale(1.3) rotate(20deg); opacity: 1; }
  100% { transform: scale(1.2) rotate(18deg); opacity: 0; }
}
.confetti-ring {
  animation: burst 0.55s ease forwards;
}

/* ─── RESPONSIVE ─────────────────────────────────────── */
@media (max-width: 420px) {
  body { padding: 0 0 40px; }
  .card { border-radius: 0; box-shadow: none; max-width: 100%; }
  .header { padding: 24px 20px 20px; }
  .body { padding: 20px 16px 24px; }
  .streak-section { padding: 0 16px 20px; }
  .footer { padding: 14px 16px 18px; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition: none !important; animation: none !important; }
}
</style>
</head>
<body>

<div class="card" id="app">

  <!-- HEADER -->
  <div class="header">
    <p class="header-eyebrow">The Wellness Club · Lock In</p>
    <h1 class="header-title">Today's <em>habits</em></h1>
    <p class="header-date" id="header-date"></p>
    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 72 72">
        <circle class="ring-track" cx="36" cy="36" r="30" />
        <circle class="ring-fill" id="ring-fill" cx="36" cy="36" r="30" />
      </svg>
      <div class="ring-label">
        <span class="ring-pct" id="ring-pct">0%</span>
        <span class="ring-done">done</span>
      </div>
    </div>
  </div>

  <!-- BODY -->
  <div class="body">

    <p class="section-label">Core habits</p>

    <!-- HYDRATION -->
    <div class="habit-row" id="row-water">
      <div class="habit-row-top">
        <div>
          <div class="habit-name">Hydration</div>
          <div class="habit-sub">2.5L daily goal</div>
        </div>
        <div class="check-btn" id="check-water" role="checkbox" aria-checked="false" aria-label="Mark hydration complete">
          <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
            <path d="M1 5l3.5 3.5L11 1" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
      <div class="water-controls">
        <button class="water-btn" onclick="addWater(250)">+250ml</button>
        <button class="water-btn" onclick="addWater(500)">+500ml</button>
        <button class="water-btn" onclick="addWater(-250)" style="color:var(--mid)">−</button>
        <div class="water-display" id="water-display">0<span>ml</span></div>
      </div>
      <div class="water-bar-wrap">
        <div class="water-bar-fill" id="water-bar"></div>
      </div>
    </div>

    <!-- STEPS -->
    <div class="habit-row" id="row-steps">
      <div class="habit-row-top">
        <div>
          <div class="habit-name">Step count</div>
          <div class="habit-sub">Log your steps for today</div>
        </div>
        <div class="check-btn" id="check-steps" role="checkbox" aria-checked="false" aria-label="Mark steps complete">
          <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
            <path d="M1 5l3.5 3.5L11 1" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
      <div class="num-input-wrap">
        <div class="num-stepper">
          <button class="stepper-btn" onclick="stepBy('steps',-500)" aria-label="Decrease steps">−</button>
          <input class="stepper-val" id="steps-val" type="number" value="0" min="0" max="99999" inputmode="numeric" onchange="syncNumHabit('steps')" />
          <button class="stepper-btn" onclick="stepBy('steps',500)" aria-label="Increase steps">+</button>
          <span class="stepper-unit">steps</span>
        </div>
        <span class="num-goal-badge">Goal: 8k+</span>
      </div>
    </div>

    <!-- PROTEIN -->
    <div class="habit-row" id="row-protein">
      <div class="habit-row-top">
        <div>
          <div class="habit-name">Protein goal</div>
          <div class="habit-sub">Log your daily grams</div>
        </div>
        <div class="check-btn" id="check-protein" role="checkbox" aria-checked="false" aria-label="Mark protein complete">
          <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
            <path d="M1 5l3.5 3.5L11 1" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
      <div class="num-input-wrap">
        <div class="num-stepper">
          <button class="stepper-btn" onclick="stepBy('protein',-5)" aria-label="Decrease protein">−</button>
          <input class="stepper-val" id="protein-val" type="number" value="0" min="0" max="999" inputmode="numeric" onchange="syncNumHabit('protein')" />
          <button class="stepper-btn" onclick="stepBy('protein',5)" aria-label="Increase protein">+</button>
          <span class="stepper-unit">g</span>
        </div>
        <span class="num-goal-badge">Goal: 120g+</span>
      </div>
    </div>

    <!-- MORNING MOVEMENT -->
    <div class="habit-row" id="row-movement">
      <div class="habit-row-top">
        <div>
          <div class="habit-name">Morning movement</div>
          <div class="habit-sub">Walk, stretch, or train</div>
        </div>
        <label class="toggle" aria-label="Toggle morning movement">
          <input type="checkbox" id="movement-toggle" onchange="syncToggle()" />
          <span class="toggle-track"></span>
          <span class="toggle-thumb"></span>
        </label>
      </div>
    </div>

    <!-- CUSTOM HABITS -->
    <p class="section-label" id="custom-label" style="display:none">Your habits</p>
    <div id="custom-list"></div>

    <!-- ADD CUSTOM -->
    <div class="add-input-wrap">
      <span class="add-icon">+</span>
      <input class="add-input" id="add-input" type="text" placeholder="Add a habit… (press Enter)" maxlength="60" />
    </div>

  </div>

  <!-- STREAK -->
  <div class="streak-section">
    <p class="streak-label">7-day streak</p>
    <div class="streak-days" id="streak-days"></div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <span class="footer-text">The Wellness Club</span>
    <button class="reset-btn" onclick="resetDay()">Reset today</button>
  </div>

</div>

<script>
/* ─── STORAGE KEYS ───────────────────────────────────── */
const KEY   = () => 'wc_' + todayStr();
const CKEY  = 'wc_custom_habits';
const SKEY  = 'wc_streak';

/* ─── DATE UTILS ─────────────────────────────────────── */
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function daysBefore(n) {
  const d = new Date(); d.setDate(d.getDate() - n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

/* ─── STATE ──────────────────────────────────────────── */
let state = {
  water: 0,
  steps: 0,
  protein: 0,
  movement: false,
  checked: { water: false, steps: false, protein: false, movement: false }
};
let customHabits = []; // [{id, label, checked}]

function loadState() {
  const raw = localStorage.getItem(KEY());
  if (raw) { try { state = JSON.parse(raw); } catch(e) {} }
  const cr = localStorage.getItem(CKEY);
  if (cr) { try { customHabits = JSON.parse(cr); } catch(e) {} }
  // reset daily checks on custom habits if stored day differs
  customHabits.forEach(h => { if (!('checked' in h)) h.checked = false; });
}

function saveState() {
  localStorage.setItem(KEY(), JSON.stringify(state));
  localStorage.setItem(CKEY, JSON.stringify(customHabits));
}

/* ─── DATE HEADER ────────────────────────────────────── */
function renderDate() {
  const d = new Date();
  const opts = { weekday:'long', month:'long', day:'numeric' };
  document.getElementById('header-date').textContent = d.toLocaleDateString('en-GB', opts);
}

/* ─── PROGRESS ───────────────────────────────────────── */
function calcProgress() {
  const core = ['water','steps','protein','movement'];
  const coreChecked = core.filter(k => state.checked[k]).length;
  const customChecked = customHabits.filter(h => h.checked).length;
  const total = core.length + customHabits.length;
  return total > 0 ? Math.round(((coreChecked + customChecked) / total) * 100) : 0;
}

function updateRing() {
  const pct = calcProgress();
  const circumference = 188.5;
  const offset = circumference - (pct / 100) * circumference;
  document.getElementById('ring-fill').style.strokeDashoffset = offset;
  document.getElementById('ring-pct').textContent = pct + '%';
  if (pct === 100) markStreakToday();
}

/* ─── WATER ──────────────────────────────────────────── */
function addWater(ml) {
  state.water = Math.max(0, state.water + ml);
  const goal = 2500;
  const pct = Math.min(100, (state.water / goal) * 100);
  document.getElementById('water-display').innerHTML = state.water + '<span>ml</span>';
  document.getElementById('water-bar').style.width = pct + '%';
  if (state.water >= goal && !state.checked.water) {
    setChecked('water', true);
  } else if (state.water < goal) {
    setChecked('water', false);
  }
  saveState(); updateRing();
}

/* ─── NUM HABITS ─────────────────────────────────────── */
function stepBy(key, delta) {
  const el = document.getElementById(key + '-val');
  const val = Math.max(0, (parseInt(el.value) || 0) + delta);
  el.value = val;
  state[key] = val;
  saveState(); updateRing();
}
function syncNumHabit(key) {
  const val = Math.max(0, parseInt(document.getElementById(key + '-val').value) || 0);
  state[key] = val;
  saveState(); updateRing();
}

/* ─── TOGGLE ─────────────────────────────────────────── */
function syncToggle() {
  const checked = document.getElementById('movement-toggle').checked;
  state.movement = checked;
  state.checked.movement = checked;
  document.getElementById('check-movement').classList.toggle('checked', checked);
  document.getElementById('row-movement').classList.toggle('completed', checked);
  saveState(); updateRing();
}

/* ─── CHECKBOXES ─────────────────────────────────────── */
function setChecked(key, val) {
  state.checked[key] = val;
  const el = document.getElementById('check-' + key);
  if (!el) return;
  el.classList.toggle('checked', val);
  el.setAttribute('aria-checked', String(val));
  const row = document.getElementById('row-' + key);
  if (row) row.classList.toggle('completed', val);
}

function toggleCheck(key) {
  const newVal = !state.checked[key];
  setChecked(key, newVal);
  if (key === 'movement') {
    state.movement = newVal;
    document.getElementById('movement-toggle').checked = newVal;
  }
  saveState(); updateRing();
}

/* ─── CUSTOM HABITS ──────────────────────────────────── */
function renderCustom() {
  const list = document.getElementById('custom-list');
  const label = document.getElementById('custom-label');
  list.innerHTML = '';
  label.style.display = customHabits.length ? 'block' : 'none';
  customHabits.forEach((h, i) => {
    const row = document.createElement('div');
    row.className = 'custom-row habit-row' + (h.checked ? ' completed' : '');
    row.innerHTML = `
      <span class="habit-name" style="font-size:0.85rem">${escHtml(h.label)}</span>
      <div class="check-btn ${h.checked ? 'checked' : ''}" 
           role="checkbox" aria-checked="${h.checked}"
           onclick="toggleCustom(${i})"
           aria-label="Mark ${escHtml(h.label)} complete">
        <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
          <path d="M1 5l3.5 3.5L11 1" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <button onclick="deleteCustom(${i})" style="background:none;border:none;color:var(--mid);font-size:0.8rem;cursor:pointer;padding:2px 4px;line-height:1;flex-shrink:0" aria-label="Delete habit">✕</button>
    `;
    row.style.display = 'flex';
    row.style.alignItems = 'center';
    row.style.gap = '10px';
    list.appendChild(row);
  });
  updateRing();
}

function toggleCustom(i) {
  customHabits[i].checked = !customHabits[i].checked;
  saveState(); renderCustom(); updateRing();
}
function deleteCustom(i) {
  customHabits.splice(i, 1);
  saveState(); renderCustom(); updateRing();
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ─── ADD INPUT ──────────────────────────────────────── */
document.getElementById('add-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && this.value.trim()) {
    customHabits.push({ id: Date.now(), label: this.value.trim(), checked: false });
    this.value = '';
    saveState(); renderCustom(); updateRing();
  }
});

/* ─── STREAK ─────────────────────────────────────────── */
const DAYS = ['S','M','T','W','T','F','S'];

function loadStreak() {
  try { return JSON.parse(localStorage.getItem(SKEY)) || {}; } catch(e) { return {}; }
}
function saveStreak(s) { localStorage.setItem(SKEY, JSON.stringify(s)); }

function markStreakToday() {
  const s = loadStreak();
  s[todayStr()] = true;
  saveStreak(s); renderStreak();
}

function renderStreak() {
  const container = document.getElementById('streak-days');
  container.innerHTML = '';
  const streak = loadStreak();
  const today = todayStr();
  for (let i = 6; i >= 0; i--) {
    const ds = daysBefore(i);
    const d = new Date(); d.setDate(d.getDate() - i);
    const dayChar = DAYS[d.getDay()];
    const isToday = (ds === today);
    const isComplete = !!streak[ds];
    const div = document.createElement('div');
    div.className = 'streak-day' + (isToday ? ' today active' : '') + (isComplete ? ' complete' : '');
    div.innerHTML = `<div class="streak-dot">${isComplete ? '✓' : dayChar}</div><span class="streak-char">${dayChar}</span>`;
    container.appendChild(div);
  }
}

/* ─── RESET ──────────────────────────────────────────── */
function resetDay() {
  if (!confirm('Reset all habits for today?')) return;
  state = { water:0, steps:0, protein:0, movement:false, checked:{water:false,steps:false,protein:false,movement:false} };
  customHabits.forEach(h => h.checked = false);
  saveState(); init();
}

/* ─── INIT ───────────────────────────────────────────── */
function init() {
  loadState(); renderDate();

  // water
  document.getElementById('water-display').innerHTML = state.water + '<span>ml</span>';
  document.getElementById('water-bar').style.width = Math.min(100,(state.water/2500)*100) + '%';
  setChecked('water', state.checked.water || false);

  // steps
  document.getElementById('steps-val').value = state.steps || 0;
  setChecked('steps', state.checked.steps || false);

  // protein
  document.getElementById('protein-val').value = state.protein || 0;
  setChecked('protein', state.checked.protein || false);

  // movement
  document.getElementById('movement-toggle').checked = !!state.movement;
  setChecked('movement', state.checked.movement || false);

  // wire core checkboxes
  ['water','steps','protein','movement'].forEach(key => {
    const el = document.getElementById('check-' + key);
    if (el) el.addEventListener('click', () => toggleCheck(key));
  });

  renderCustom();
  renderStreak();
  updateRing();
}

/* ─── SAFE INIT ──────────────────────────────────────── */
function safeInit() {
  // Guard: if key elements aren't in DOM yet, bail
  if (!document.getElementById('ring-fill')) return;
  init();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', safeInit);
} else {
  safeInit();
}
</script>
</body>
</html>
